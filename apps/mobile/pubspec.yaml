name: widenote_mobile
description: WideNote Flutter mobile client skeleton.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  crypto: ^3.0.7
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.3.1
  go_router: ^14.6.3
  image_picker: ^1.2.2
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  record: ^6.2.1
  sherpa_onnx: ^1.13.3
  sqlite3_flutter_libs: ^0.5.42
  widenote_agent_runtime:
    path: ../../packages/dart/agent_runtime
  widenote_cards:
    path: ../../packages/dart/cards
  widenote_core:
    path: ../../packages/dart/core
  widenote_local_db:
    path: ../../packages/dart/local_db
  widenote_memory:
    path: ../../packages/dart/memory
  widenote_model_providers:
    path: ../../packages/dart/model_providers

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
